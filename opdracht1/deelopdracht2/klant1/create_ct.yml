- hosts: localhost
  connection: local

  vars:
    proxmox_api_user: "root@pam"
    proxmox_api_token_id: "ansible2"
    proxmox_api_token_secret: "5c3de81c-c090-4a80-865b-8ce59920a4f3"
    proxmox_api_host: "10.24.37.4"
    ssh_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
    containers:
      - { id: 603, ip: 10.24.37.61 }
     # - { id: 604, ip: 10.24.37.62 }
     # - { id: 605, ip: 10.24.37.63 }

  tasks:
    - name: Stop container
      shell: ssh root@{{ proxmox_api_host }} "pct stop {{ item.id }}"
      loop: "{{ containers }}"
      ignore_errors: yes

    - name: Remove container via SSH
      shell: ssh root@{{ proxmox_api_host }} "pct destroy {{ item.id }} --purge"
      loop: "{{ containers }}"
      ignore_errors: yes

    - name: Clone container via SSH
      shell: ssh root@{{ proxmox_api_host }} "pct clone 600 {{ item.id }} --hostname wp{{ item.id }}"
      loop: "{{ containers }}"

    - name: Remove old network config
      shell: ssh root@{{ proxmox_api_host }} "pct set {{ item.id }} -delete net0"
      loop: "{{ containers }}"
      ignore_errors: yes

    - name: Set IP
      shell: ssh root@{{ proxmox_api_host }} "pct set {{ item.id }} -net0 name=eth0,bridge=vmbr0,ip={{ item.ip }}/24,gw=10.24.37.1"
      loop: "{{ containers }}"

    - name: Start container
      shell: ssh root@{{ proxmox_api_host }} "pct start {{ item.id }}"
      loop: "{{ containers }}"

    - name: Add SSH key to container
      shell: |
        ssh root@{{ proxmox_api_host }} "pct exec {{ item.id }} -- mkdir -p /root/.ssh"
        ssh root@{{ proxmox_api_host }} "pct exec {{ item.id }} -- bash -c 'echo \"{{ ssh_key }}\" >> /root/.ssh/authorized_keys'"
        ssh root@{{ proxmox_api_host }} "pct exec {{ item.id }} -- chmod 600 /root/.ssh/authorized_keys"
      loop: "{{ containers }}"

    - name: Enable firewall
      shell: ssh root@{{ proxmox_api_host }} "pct set {{ item.id }} -features nesting=1"
      loop: "{{ containers }}"

    - name: Allow HTTP
      shell: ssh root@{{ proxmox_api_host }} "pvesh create /nodes/PVE03/lxc/{{ item.id }}/firewall/rules -type in -action ACCEPT -proto tcp -dport 80"
      loop: "{{ containers }}"

    - name: Allow HTTPS
      shell: ssh root@{{ proxmox_api_host }} "pvesh create /nodes/PVE03/lxc/{{ item.id }}/firewall/rules -type in -action ACCEPT -proto tcp -dport 443"
      loop: "{{ containers }}"

    - name: Allow SSH
      shell: ssh root@{{ proxmox_api_host }} "pvesh create /nodes/PVE03/lxc/{{ item.id }}/firewall/rules -type in -action ACCEPT -proto tcp -dport 22"
      loop: "{{ containers }}"

    - name: Set default policy DROP
      shell: ssh root@{{ proxmox_api_host }} "pvesh set /nodes/PVE03/lxc/{{ item.id }}/firewall/options -policy_in DROP -policy_out ACCEPT -enable 1"
      loop: "{{ containers }}"
